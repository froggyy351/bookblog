services:
  app:
    build: .
    environment:
      DB_URL: jdbc:postgresql://db:5432/bookblog
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
  db:
    image: postgres
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: bookblog
    volumes:
      - ./src/main/resources/sql/create_books_table.sql:/docker-entrypoint-initdb.d/create_books_table.sql
